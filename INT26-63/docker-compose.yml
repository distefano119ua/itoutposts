name: meeting-03-homework-slo

services:
  grafana:
    image: grafana/grafana:12.3.1
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - "./grafana/provisioning:/etc/grafana/provisioning"
    depends_on:
      - mimir

  mimir:
    image: grafana/mimir:2.17.4
    command: ["-ingester.native-histograms-ingestion-enabled=true", "-config.file=/etc/mimir.yaml"]
    ports:
      - "9009:9009"
    volumes:
      - "./mimir/mimir.yaml:/etc/mimir.yaml"

  alloy:
    image: grafana/alloy:v1.12.1
    command: [
      "run",
      "--server.http.listen-addr=0.0.0.0:12345",
      "/etc/alloy/config.alloy"
    ]
    ports:
      - "12347:12345"
    volumes:
      - "./alloy/config.alloy:/etc/alloy/config.alloy"
      - "./alloy/endpoints.json:/etc/alloy/endpoints.json"
    depends_on:
      - mimir
      - sre-demo

  sre-demo:
    build:
      context: ./service
    ports:
      - "8080:8080"

  loadgen:
    image: curlimages/curl:8.8.0
    restart: unless-stopped
    command: ["/bin/sh", "/scripts/generate.sh"]
    volumes:
      - "./loadgen/generate.sh:/scripts/generate.sh:ro"
    depends_on:
      - sre-demo

---
- name: Remove old/conflicting Docker packages
  apt:
    name: "{{ docker_old_packages }}"
    state: absent
    purge: yes
  ignore_errors: yes

- name: Install required packages
  apt:
    name: "{{ docker_required_packages }}"
    state: present
    update_cache: yes

- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker official GPG key
  get_url:
    url: "{{ docker_gpg_key_url }}"
    dest: "{{ docker_gpg_key_path }}"
    mode: "0644"

- name: Add Docker apt repository
  apt_repository:
    repo: "deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present
    update_cache: yes

- name: Install Docker Engine and Compose Plugin
  apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: yes
  notify: Restart Docker

- name: Check Docker version
  command: docker --version
  changed_when: false
  register: docker_version

- name: Check Docker Compose plugin version
  command: docker compose version
  changed_when: false
  register: compose_version

- name: Show installed versions
  debug:
    msg:
      - "{{ docker_version.stdout }}"
      - "{{ compose_version.stdout }}"
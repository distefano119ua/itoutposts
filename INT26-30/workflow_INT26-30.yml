name: INT26-30 homework

on:
  push:
    paths:
      - "INT26-24/**"
      - ".github/workflows/INT26-30.yml"
  pull_request:
    paths:
      - "INT26-24/**"
      - ".github/workflows/INT26-30.yml"

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  integration:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    defaults:
      run:
        working-directory: INT26-24

    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose -p itouposts-network -f docker-compose.ci.yaml up -d --build

      - name: Check API health
        run: |
            for i in {1..10}; do
              if curl -s http://localhost:7777/health | grep -q "ok"; then
                echo "API is healthy!"
                exit 0
              else
                echo "Waiting for API to be healthy..."
                sleep 2
              fi
            done
            echo "API did not become healthy in time."
            exit 1

      - name: Check MongoDB
        run: |
            docker compose -p itouposts-network -f docker-compose.ci.yaml exec -T mongodb \
              mongosh --eval "db.adminCommand('ping')"

      # Після перевірок — логін в registry
      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # Після логіну — збірка та публікація образу
      - name: Build and push backend image      
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ./INT26-24
          file: ./INT26-24/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:1.0.1
      
      # Після логіну — збірка та публікація образу
      - name: Build and push frontend image      
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ./INT26-24/frontend
          file: ./INT26-24/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend:1.0.0
      
      - name: Stop services
        if: always()
        run: docker compose -p itouposts-network -f docker-compose.ci.yaml down
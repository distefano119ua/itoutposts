---
- name: Create app directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create nginx config directory
  file:
    path: "{{ app_dir }}/nginx"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create nginx HTTP config
  template:
    src: nginx.conf.j2
    dest: "{{ app_dir }}/nginx/default.conf"
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx container
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor-api
  namespace: cars-app
  labels:
    app: monitor-api
    role: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monitor-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: monitor-api
        role: web
    spec:
      nodeSelector:
        role: app
      imagePullSecrets:
        - name: registry-secret
      containers:
        - name: monitor-api
          image: 192.168.56.10:30500/monitor-api:v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7000
          envFrom:
            - configMapRef:
                name: monitor-api-config
            - secretRef:
                name: monitor-api-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 7000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 7000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: monitor-api
  namespace: cars-app
  labels:
    app: monitor-api
    role: web
spec:
  type: ClusterIP
  selector:
    app: monitor-api
  ports:
    - name: http
      port: 7000
      targetPort: 7000
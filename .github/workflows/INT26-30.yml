name: INT26-30 homework

on:
  push:
    paths:
      - "INT26-24/**"
      - ".github/workflows/INT26-30.yml"
  pull_request:
    paths:
      - "INT26-24/**"
      - ".github/workflows/INT26-30.yml"

jobs:
  integration:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    defaults:
      run:
        working-directory: INT26-24

    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose -p itouposts-network -f docker-compose.yaml up -d

      - name: Check API health
        run: curl -fs http://localhost:7777/health

      - name: Check MongoDB
        run: |
            docker compose -p itouposts-network -f docker-compose.yaml exec -T mongodb \
              mongosh --eval "db.adminCommand('ping')"
      
      - name: Stop services
        run: docker compose -p itouposts-network -f docker-compose.yaml down